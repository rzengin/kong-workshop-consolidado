_format_version: "3.0"
_konnect:
  control_plane_name: KongAir_External
plugins:
- config:
    access_logs:
      custom_attributes_by_lua: null
      endpoint: null
    access_logs_endpoint: null
    batch_flush_delay: null
    batch_span_count: null
    connect_timeout: 1000
    header_type: preserve
    headers: null
    http_response_header_for_traceid: null
    logs_endpoint: http://host.docker.internal:4318/v1/logs
    metrics:
      enable_ai_metrics: false
      enable_bandwidth_metrics: false
      enable_consumer_attribute: false
      enable_latency_metrics: false
      enable_request_metrics: false
      enable_upstream_health_metrics: false
      endpoint: null
      push_interval: 60
    propagation:
      clear: null
      default_format: w3c
      extract: null
      inject: null
    queue:
      concurrency_limit: 1
      initial_retry_delay: 0.01
      max_batch_size: 200
      max_bytes: null
      max_coalescing_delay: 1
      max_entries: 10000
      max_retry_delay: 60
      max_retry_time: 60
    read_timeout: 5000
    resource_attributes:
      service.name: kong-api-gateway
    sampling_rate: null
    sampling_strategy: parent_drop_probability_fallback
    send_timeout: 5000
    traces_endpoint: http://host.docker.internal:4318/v1/traces
  enabled: true
  name: opentelemetry
  protocols:
  - grpc
  - grpcs
  - http
  - https
services:
- connect_timeout: 60000
  enabled: true
  host: host.docker.internal
  name: flights
  path: /anything/flights
  port: 9081
  protocol: http
  read_timeout: 60000
  retries: 5
  routes:
  - https_redirect_status_code: 426
    name: flights-route
    path_handling: v0
    paths:
    - /flights
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: true
  write_timeout: 60000
- connect_timeout: 60000
  enabled: true
  host: host.docker.internal
  name: routes
  path: /anything/routes
  port: 9081
  protocol: http
  read_timeout: 60000
  retries: 5
  routes:
  - https_redirect_status_code: 426
    name: routes-route
    path_handling: v0
    paths:
    - /routes
    preserve_host: false
    protocols:
    - http
    - https
    regex_priority: 0
    request_buffering: true
    response_buffering: true
    strip_path: true
  write_timeout: 60000
