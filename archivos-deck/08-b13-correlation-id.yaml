_format_version: "3.0"

plugins:
  - name: correlation-id
    config:
      header_name: x-correlation-id
      echo_downstream: true
      generator: uuid
  - name: opentelemetry
    config:
      traces_endpoint: http://host.docker.internal:4318/v1/traces
      logs_endpoint: http://host.docker.internal:4318/v1/logs
      resource_attributes:
        service.name: kong-api-gateway

services:
  - name: flights
    url: http://host.docker.internal:8081/anything/flights
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: acl
        config:
          allow:
            - external
    routes:
      - name: flights-route
        paths:
          - /flights
        methods:
          - GET
        plugins:
          - name: response-transformer
            config:
              add:
                headers:
                  - "x-perceptiva: true"
              remove:
                headers:
                  - "Via"

  - name: routes
    url: http://host.docker.internal:8081/anything/routes
    routes:
      - name: routes-route
        paths:
          - /routes

  - name: get-test
    url: http://host.docker.internal:8081/get
    routes:
      - name: get-route
        paths:
          - /get
        plugins:
          - name: request-transformer
            config:
              add:
                headers:
                  - "x-inter-env: lab"

consumers:
  - username: App-External
    acls:
      - group: external
    keyauth_credentials:
      - key: external-secret-123
    plugins:
      - name: rate-limiting
        config:
          minute: 20
          policy: local
  - username: App-Internal
    acls:
      - group: internal
    keyauth_credentials:
      - key: internal-secret-123
    plugins:
      - name: rate-limiting
        config:
          minute: 3
          policy: local
